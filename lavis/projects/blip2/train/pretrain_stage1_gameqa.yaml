 model:
   arch: blip2
   model_type: pretrain
   load_pretrained: True 
   freeze_vit: True
   image_size: 364

 datasets:
   gameqa:
     vis_processor:
       train:
         name: "blip2_image_train"
         image_size: 364
     text_processor:
       train:
         name: "blip_caption"
         max_txt_len: 512

 run:
   task: image_text_pretrain
   # optimizer
   lr_sched: "linear_warmup_cosine_lr"
   init_lr: 1e-4
   min_lr: 1e-5
   warmup_lr: 1e-6

   weight_decay: 0.05
   max_epoch: 1
   batch_size_train: 16
   batch_size_eval: 4
   num_workers: 4
   warmup_steps: 5000

   seed: 42
   output_dir: "/kaggle/working/output/BLIP2/Pretrain_stage1_gameqa"

   amp: True
   resume_ckpt_path: null
   save_freq: 5
   save_last: True

   evaluate: False
   train_splits: ["train"]

   device: "cuda"
   world_size: 1
  #  dist_url: "env://"
   distributed: False
